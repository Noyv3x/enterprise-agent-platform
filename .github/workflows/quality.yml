name: Quality gates

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Every main commit can already be running on a source deployment waiting
  # for its exact container release. Keep push generations independent; only
  # supersede repeated validation for the same pull request.
  group: quality-${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.ref || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  documentation:
    name: Documentation contracts
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out source history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Validate canonical documentation
        run: python scripts/docs_sync.py check

      - name: Validate pull request synchronization
        if: github.event_name == 'pull_request'
        run: >-
          python scripts/docs_sync.py check-change
          --base "${{ github.event.pull_request.base.sha }}"
          --head "${{ github.event.pull_request.head.sha }}"

      - name: Validate pushed synchronization
        if: github.event_name == 'push'
        run: >-
          python scripts/docs_sync.py check-change
          --base "${{ github.event.before }}"
          --head "${{ github.sha }}"

      - name: Validate manually dispatched synchronization
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          base="$(git merge-base HEAD origin/main 2>/dev/null || true)"
          if [[ -z "$base" || "$base" == "$(git rev-parse HEAD)" ]]; then
            base="$(git rev-parse --verify HEAD^ 2>/dev/null || printf '%040d' 0)"
          fi
          python scripts/docs_sync.py check-change --base "$base" --head HEAD

  backend:
    name: Python 3.11
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: enterprise-agent-platform
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: enterprise-agent-platform/pyproject.toml

      - name: Set up Node.js for deployment checks
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"

      - name: Install platform
        run: python -m pip install --no-input --editable .

      - name: Compile Python sources
        run: python -m compileall -q enterprise_agent_platform tests

      - name: Run Python tests
        run: python -m unittest discover -s tests -v

      - name: Verify fetchable managed upstream sources
        shell: bash
        run: |
          data_dir="$(mktemp -d)"
          trap 'rm -rf "$data_dir"' EXIT
          python - "$data_dir" <<'PY'
          import sys
          from pathlib import Path

          from enterprise_agent_platform.deployment import DeploymentManager, DeploymentPaths

          repository_root = Path.cwd().parent.resolve()
          paths = DeploymentPaths.from_root(
              repository_root,
              data_dir=Path(sys.argv[1]).resolve(),
          )
          DeploymentManager(paths).ensure_managed_sources(("cognee", "firecrawl"))
          PY

  frontend:
    name: Node 24
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: enterprise-agent-platform/frontend
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: enterprise-agent-platform/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Type-check frontend
        run: npm run check

      - name: Run frontend tests
        run: npm test

      - name: Build browser assets
        run: npm run build

      - name: Verify generated assets are committed
        working-directory: .
        shell: bash
        run: |
          static_dir="enterprise-agent-platform/enterprise_agent_platform/static"
          git diff --exit-code -- "$static_dir"
          if [[ -n "$(git status --porcelain --untracked-files=all -- "$static_dir")" ]]; then
            echo "Generated browser assets are not in sync with frontend source." >&2
            git status --short --untracked-files=all -- "$static_dir" >&2
            exit 1
          fi

      - name: Audit frontend dependencies
        run: npm audit --audit-level=high

  agent-runtime:
    name: Agent runtime (Node 24)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: enterprise-agent-platform/agent-runtime
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: enterprise-agent-platform/agent-runtime/package-lock.json

      - name: Install runtime dependencies
        run: npm ci

      - name: Type-check runtime
        run: npm run check

      - name: Run runtime tests
        run: npm test

      - name: Build runtime
        run: npm run build

      - name: Audit runtime dependencies
        run: npm audit --audit-level=high

  manager:
    name: Manager (Go)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: manager
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version-file: manager/go.mod
          cache: false

      - name: Test manager
        run: go test ./...

      - name: Vet manager
        run: go vet ./...

      - name: Build manager
        run: go build ./cmd/ubitech-manager

  container-definitions:
    name: Container definitions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Validate Dockerfiles, Compose, and release schema
        run: scripts/container-smoke.sh
