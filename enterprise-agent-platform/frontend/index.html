<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Enterprise Agent Platform</title>
    <meta name="description" content="企业内部私有 AI Agent 平台 - 频道协作、私人 Agent、企业知识库与运行时管理。" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#f3efe6" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1c1a17" media="(prefers-color-scheme: dark)" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%237080A0'/%3E%3Cpath d='M10 9v7a6 6 0 0 0 12 0V9' fill='none' stroke='white' stroke-width='3' stroke-linecap='round'/%3E%3C/svg%3E"
    />
    <script>
      // Apply persisted theme before first paint to avoid a flash.
      try {
        var t = localStorage.getItem("eap-theme");
        if (t === "light" || t === "dark") document.documentElement.dataset.theme = t;
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="react-root"></div>
    <div id="app"></div>
    <div id="toast-stack" class="toast-stack" aria-live="polite" aria-atomic="false"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
